<!DOCTYPE html>
<html lang="en-US" dir="ltr" translate="no">
<head>
    <meta charset="utf-8">
    <meta name="google" content="notranslate">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#0B1D2A">
    <meta name="description" content="Browse our complete range of plastic combs - hair styling, barber professional, pocket, anti-static, wide tooth, tail combs and custom molded combs.">
    <meta name="keywords" content="plastic combs catalog, wholesale combs, barber combs, hair styling combs, custom plastic combs, Embaby Plast">

    <title>Product Catalog - Embaby Plast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="../script.js" defer></script>
</head>
<body>

<header id="site-header"></header>

<!-- products start -->
<section class="products luxury-grid" id="products">
    <h1 class="heading">Product <span>Catalog</span></h1>
    <div class="products-search">
        <i class="fas fa-search products-search-icon"></i>
        <input type="text" id="product-search" class="products-search-input" placeholder="Search by product name or description..." autocomplete="off">
    </div>
    <p class="products-total-count" id="products-total-count"></p>
    <p class="products-no-results" id="no-results" style="display:none;">No products match your search.</p>
    <div class="box-container">
    </div>
</section>
<!-- products end -->

<footer class="footer" id="site-footer"></footer>

</body>
</html>
