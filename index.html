<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#0B1D2A">
    <title>Embaby Plast | Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Inter", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0B1D2A 0%, #143042 50%, #0B1D2A 100%);
            color: #fff;
        }
        .welcome-container {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 600px;
        }
        .welcome-logo {
            font-family: "Montserrat", sans-serif;
            font-size: 3.6rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        .welcome-logo span { color: #00A8A8; }
        .welcome-tagline {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 3rem;
        }
        .welcome-label {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: rgba(255,255,255,0.85);
        }
        .lang-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .lang-btn {
            display: inline-block;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.25s ease;
            min-width: 180px;
        }
        .lang-btn-ar {
            background: #00A8A8;
            color: #fff;
        }
        .lang-btn-ar:hover {
            background: #007777;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,168,168,0.4);
        }
        .lang-btn-en {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.4);
        }
        .lang-btn-en:hover {
            border-color: #00A8A8;
            color: #00A8A8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="welcome-logo">Embaby <span>Plast</span></div>
        <p class="welcome-tagline">Precision Plastic Combs Manufacturer</p>
        <p class="welcome-label">Choose your language / اختر اللغة</p>
        <div class="lang-buttons">
            <a href="ar/index.html" class="lang-btn lang-btn-ar" onclick="localStorage.setItem('lang','ar')">العربية</a>
            <a href="en/index.html" class="lang-btn lang-btn-en" onclick="localStorage.setItem('lang','en')">English</a>
        </div>
    </div>
</body>
</html>
